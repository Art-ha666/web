[www]
user = www-data
group = www-data
listen = 127.0.0.1:9000

; --- Pool sizing (2 GB VPS) ---------------------------------------------------
; A hard cap so a traffic burst can NEVER overcommit RAM and OOM/swap-thrash the
; box (the old pm.max_children=20 could demand ~1GB+ of workers alone). With the
; other containers' baseline (~700MB) this pool peaks at ~12 workers (~700MB),
; leaving comfortable headroom on the 2 GB box. Cloudflare edge-caches anonymous
; pages, so real concurrent PHP requests stay in the single digits in practice.
pm = dynamic
pm.max_children = 12
pm.start_servers = 3
pm.min_spare_servers = 2
pm.max_spare_servers = 6
; Recycle workers periodically to bound any per-worker memory growth.
pm.max_requests = 500

; Surface pool saturation (scrape http://127.0.0.1:8080/fpm-status) so we can
; see when to scale instead of silently queueing/502ing.
pm.status_path = /fpm-status

clear_env = no
catch_workers_output = yes
decorate_workers_output = no
access.log = /dev/null
php_admin_value[error_log] = /dev/stderr
php_admin_flag[log_errors] = on
