name: Deploy to AWS

# Deploys AKH Solutions to AWS ECS Fargate behind an Application Load Balancer.
#
# One-time AWS setup expected (the "best way" reference architecture):
#   • ECR repository:        akh-solutions
#   • ECS cluster + service: akh-cluster / akh-solutions  (Fargate, awsvpc, behind an ALB target group on :8080)
#   • RDS MySQL 8            (db credentials in Secrets Manager: akh/db-*)
#   • ElastiCache Redis      (host in Secrets Manager: akh/redis-host)
#   • Secrets Manager        akh/app-key, akh/db-*, akh/redis-host, akh/mail-*
#   • CloudWatch log group   /ecs/akh-solutions
#   • GitHub OIDC IAM role   that can push to ECR + register/deploy ECS task defs + run-task
#
# Required GitHub repo settings:
#   Variables: AWS_REGION, AWS_ACCOUNT_ID, ECR_REPOSITORY (akh-solutions),
#              ECS_CLUSTER (akh-cluster), ECS_SERVICE (akh-solutions),
#              SUBNETS (comma list), SECURITY_GROUPS (comma list)
#   Secrets:   AWS_DEPLOY_ROLE_ARN  (the OIDC role to assume)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write   # for AWS OIDC
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & deploy
    runs-on: ubuntu-latest
    environment: production
    # Skip (instead of fail) until the AWS infra + secrets exist. Enable by
    # setting repository variable ENABLE_AWS_DEPLOY=true, or trigger manually.
    if: ${{ github.event_name == 'workflow_dispatch' || vars.ENABLE_AWS_DEPLOY == 'true' }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Build the production frontend assets here (PHP is needed for Wayfinder route generation).
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, intl, bcmath, zip, gd
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Build frontend assets
        run: |
          composer install --no-interaction --prefer-dist --no-progress --no-scripts
          npm ci
          npm run build

      - name: Build & push image to ECR
        id: image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          REPOSITORY: ${{ vars.ECR_REPOSITORY }}
        run: |
          IMAGE="$REGISTRY/$REPOSITORY:${{ github.sha }}"
          docker build -f docker/production/Dockerfile -t "$IMAGE" -t "$REGISTRY/$REPOSITORY:latest" .
          docker push "$IMAGE"
          docker push "$REGISTRY/$REPOSITORY:latest"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Render ECS task definition
        id: taskdef
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: docker/production/ecs-task-definition.json
          container-name: app
          image: ${{ steps.image.outputs.image }}

      - name: Run database migrations (one-off Fargate task)
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          aws ecs register-task-definition --cli-input-json "file://${{ steps.taskdef.outputs.task-definition }}" > /tmp/td.json
          TD_ARN=$(jq -r '.taskDefinition.taskDefinitionArn' /tmp/td.json)
          aws ecs run-task \
            --cluster ${{ vars.ECS_CLUSTER }} \
            --launch-type FARGATE \
            --task-definition "$TD_ARN" \
            --network-configuration "awsvpcConfiguration={subnets=[${{ vars.SUBNETS }}],securityGroups=[${{ vars.SECURITY_GROUPS }}],assignPublicIp=DISABLED}" \
            --overrides '{"containerOverrides":[{"name":"app","command":["php","artisan","migrate","--force"]}]}' \
            --started-by "gh-${{ github.run_id }}"

      - name: Deploy to ECS service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.taskdef.outputs.task-definition }}
          service: ${{ vars.ECS_SERVICE }}
          cluster: ${{ vars.ECS_CLUSTER }}
          wait-for-service-stability: true
